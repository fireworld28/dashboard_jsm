name: Automatic Spotify Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write

jobs:
  sync-spotify:
    runs-on: ubuntu-latest

    steps:
    # 1. Récupérer le code du dépôt GitHub
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    # 2. Installer Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    # 3. Installer les dépendances (spotipy, pandas, etc.)
    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    # 4. Exécuter le script en injectant tes Secrets Spotify
    - name: Run synchronization script
      env:
        SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
        SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      run: python cron_sync.py

# 5. Commit et Push de la base SQLite mise à jour vers ton GitHub
    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        
        # Vérification physique de l'existence du fichier
        if [ -f "music_manager.db" ]; then
          echo "✅ Fichier music_manager.db détecté. Préparation du suivi Git..."
          git add music_manager.db
          
          # Vérification si des changements réels ont eu lieu
          if ! git diff --cached --quiet; then
            echo "📈 Nouvelles données détectées. Génération du commit..."
            git commit -m "📈 Auto-update: Historique Spotify Kito [$(date +'%Y-%m-%d')]"
            git push
          else
            echo "Aucune nouvelle donnée aujourd'hui (déjà synchronisé)."
          fi
        else
          echo "❌ Le fichier music_manager.db n'existe pas encore."
        fi