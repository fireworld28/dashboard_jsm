name: Automatic Spotify Sync

on:
  schedule:
    # S'exécute automatiquement tous les jours à 00:00 UTC (1h ou 2h du matin en France)
    - cron: '0 0 * * *'
  workflow_dispatch: # Permet de lancer la synchronisation manuellement depuis l'onglet Actions de GitHub

jobs:
  sync-and-commit:
    runs-on: ubuntu-latest

    steps:
    # 1. Récupérer le code du dépôt GitHub
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    # 2. Installer Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    # 3. Installer les dépendances (spotipy, pandas, etc.)
    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    # 4. Exécuter le script en injectant tes Secrets Spotify
    - name: Run synchronization script
      env:
        SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
        SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      run: python cron_sync.py

# 5. Commit et Push de la base SQLite mise à jour vers ton GitHub
    - name: Commit and Push changes
      run: |
        # Configuration des identifiants du robot Git
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        
        # 🟢 ÉTAPE A : Vérification physique de l'existence du fichier
        if [ -f "music_manager.db" ]; then
          echo "✅ Fichier music_manager.db détecté. Préparation du suivi Git..."
          git add music_manager.db
          
          # 🟢 ÉTAPE B : Vérification si des changements réels ont eu lieu
          # (Évite l'erreur Git s'il n'y a rien de neuf à sauvegarder aujourd'hui)
          if ! git diff --cached --quiet; then
            echo "📈 Nouvelles données détectées. Génération du commit..."
            git commit -m "📈 Auto-update: Historique Spotify Kito [$(date +'%Y-%m-%d')]"
            git push
          else
            echo "ℹ️ Aucune nouvelle modification détectée dans la base de données aujourd'hui."
          fi
        else
          echo "❌ ERREUR CRITIQUE : Le fichier music_manager.db n'existe pas à la racine du projet."
          echo "Vérifiez que le script 'cron_sync.py' s'est exécuté sans planter."
          exit 1
        fi